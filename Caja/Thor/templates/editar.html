<!DOCTYPE html>
<html>
<head>
<title>Editar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h3>Editar venta</h3>

<form method="POST">
{% csrf_token %}

<input name="name" value="{{ sale.name }}" class="form-control mb-2">

<input name="price" type="number" value="{{ sale.price }}" class="form-control mb-2">

<input name="amount" type="number" value="{{ sale.amount }}" class="form-control mb-2">

<input name="payment" type="number" value="{{ sale.payment }}" class="form-control mb-3">

<button class="btn btn-primary">
Guardar
</button>

<a href="/" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

</body>
</html>
